<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>みおり</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d8d9d4">
<meta name="description" content="宙ぶらりんを、宙ぶらりんのまま大切にする場所。">

<!-- iOS PWA対応 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="みおり">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<!-- Zen Maru Gothic（あいろと統一） -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    /* 曇り空・霧・湿った白灰色 */
    --bg: #d8d9d4;
    --bg-deep: #c5c7c2;
    --bg-light: #e2e3df;

    /* 墨と灰 */
    --ink: #2d2e30;
    --ink-soft: #5d6066;
    --ink-mist: #8b8e93;

    /* 線・境界 */
    --line: rgba(60,65,70,0.12);
    --line-soft: rgba(60,65,70,0.06);

    /* ガラスカード */
    --glass: rgba(255,255,255,0.32);
    --glass-deep: rgba(255,255,255,0.18);
    --glass-border: rgba(255,255,255,0.45);

    /* 深い水色（アクセント） */
    --water: #6a7a85;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    height: 100%;
    overflow-x: hidden;
    max-width: 100vw;
    transition: background 0.4s ease;
  }
  html:has(body.on-ori) { background: #1a1a1a; }

  body {
    font-family: "Zen Maru Gothic", "Hiragino Maru Gothic ProN", "Hiragino Sans", sans-serif;
    font-weight: 400;
    background: var(--bg);
    color: var(--ink);
    min-height: 100%;
    max-width: 100vw;
    overflow-x: hidden;
    position: relative;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* 背景画像 — デフォルト（みお・みおあと・みおつくし）はnagori.png */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: url('nagori.png');
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
    opacity: 0.9;
    pointer-events: none;
    z-index: 0;
    transition: opacity 0.6s ease;
  }

  /* おり画面の時：body背景は黒 */
  body.on-ori {
    background-color: #1a1a1a;
  }

  /* おり画面では、ドットノイズも非表示にして地層の質感を活かす */
  body.on-ori::after {
    opacity: 0;
    display: none;
  }

  /* おり画面の時：波紋背景は隠す */
  body.on-ori::before {
    opacity: 0;
  }

  /* おり画面専用の地層背景画像（imgタグ） */
  .ori-bg {
    display: none;
    width: 100vw;
    height: auto;
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
    vertical-align: top;
  }

  /* おり画面の時だけ表示、固定背景化 */
  body.on-ori .ori-bg {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
  }

  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(0,0,0,0.015) 1px, transparent 0);
    background-size: 3px 3px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  /* おり画面の時：もう一度ドットノイズを確実に消す（CSS順序対策） */
  body.on-ori::after {
    opacity: 0 !important;
    display: none !important;
  }

  /* コンテナ */
  .container {
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    padding: 20px;
    opacity: 0;
    transform: translateY(10px);
    position: relative;
    z-index: 1;
  }

  .container.show {
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  /* ============================================
     ロゴ（上部中心・差し替え可能）
     ============================================ */
  .title-area {
    text-align: center;
    margin-top: 0;
    margin-bottom: 24px;
  }

  /* テキストロゴ（画像差し替えまでの仮表示） */
  .title-text {
    font-size: 32px;
    font-weight: 500;
    letter-spacing: 0.25em;
    color: var(--ink);
    margin: 0;
    line-height: 1;
  }

  /* 画像ロゴ（ファイルが用意できたらこっちが表示される） */
  .title-image {
    max-height: 80px;
    width: auto;
    display: block;
    margin: 0 auto;
  }

  .subtitle {
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 3px rgba(60,65,70,0.25);
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.18em;
    margin-top: 8px;
    margin-bottom: 0;
  }

  /* おり画面ではグレーに（白い水面背景でも見えるように） */
  body.on-ori .subtitle {
    color: rgba(100,105,110,0.85);
    text-shadow: none;
  }

  /* ============================================
     右側ナビ（あいろと統一）
     ============================================ */
  .side-nav {
    position: fixed;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 9999;
  }

  .side-nav button {
    /* aタグ風に振る舞わせる */
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: rgba(45,46,48,0.6);
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    padding: 6px 4px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    /* button のデフォルトをリセット */
    margin: 0;
    width: auto;
    display: block;
    line-height: 1.4;
  }

  .side-nav button:hover {
    color: var(--ink);
    background: rgba(255,255,255,0.3);
  }

  .side-nav button:active {
    opacity: 0.6;
    transform: scale(0.95);
  }

  .side-nav button.active {
    color: var(--ink);
    background: rgba(255,255,255,0.35);
  }

  .side-nav button.disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  /* おり画面の時：横メニューを白でも黒の背景でも見えるよう中間グレーに */
  body.on-ori .side-nav button {
    color: rgba(120,120,125,0.85);
    background: rgba(180,180,185,0.25);
  }

  body.on-ori .side-nav button:hover {
    color: rgba(80,80,85,1);
    background: rgba(200,200,205,0.4);
  }

  body.on-ori .side-nav button.active {
    color: rgba(60,65,70,1);
    background: rgba(220,220,225,0.5);
  }

  /* ============================================
     画面切り替え
     ============================================ */
  .screen {
    display: none;
  }

  .screen.active {
    display: block;
    animation: fadeIn 1.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ============================================
     ガラスカード
     ============================================ */
  .glass-card {
    background: var(--glass);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--glass-border);
    border-radius: 18px;
    padding: 1.8rem 1.6rem;
    margin-bottom: 1.4rem;
    box-shadow:
      0 4px 20px rgba(60,65,70,0.04),
      inset 0 1px 0 rgba(255,255,255,0.4);
    transition: all 0.6s ease;
  }

  .glass-card:focus-within {
    background: rgba(255,255,255,0.42);
    border-color: rgba(255,255,255,0.6);
  }

  .input-label {
    font-size: 0.78rem;
    color: var(--ink-soft);
    letter-spacing: 0.25em;
    margin-bottom: 0.9rem;
    display: block;
    font-weight: 500;
  }

  .input-field {
    width: 100%;
    background: transparent;
    border: none;
    padding: 0.3rem 0;
    font-family: inherit;
    font-size: 1rem;
    color: var(--ink);
    line-height: 1.9;
    resize: none;
    outline: none;
    -webkit-appearance: none;
    border-radius: 0;
  }

  textarea.input-field {
    min-height: 2.5rem;
  }

  /* 温度タグ — 丸ピル型 */
  .temperature-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .temp-tag {
    padding: 0.45rem 1.1rem;
    background: rgba(255,255,255,0.25);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-family: inherit;
    font-size: 0.95rem;
    color: var(--ink-soft);
    cursor: pointer;
    letter-spacing: 0.15em;
    transition: all 0.5s ease;
    -webkit-tap-highlight-color: transparent;
    font-weight: 500;
  }

  .temp-tag:hover {
    background: rgba(255,255,255,0.4);
    color: var(--ink);
  }

  .temp-tag.selected {
    background: rgba(106,122,133,0.35);
    color: var(--ink);
    border-color: rgba(106,122,133,0.5);
  }

  /* 矛盾メモ */
  .contradiction-pair {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 0.6rem;
    padding: 0.5rem 0.8rem;
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    border: 1px solid var(--line-soft);
  }

  .contradiction-pair .input-field {
    flex: 1;
    font-size: 0.95rem;
  }

  .contradiction-slash {
    color: var(--ink-mist);
    font-size: 1rem;
    font-weight: 300;
  }

  .add-pair-btn {
    background: none;
    border: none;
    color: var(--ink-mist);
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    padding: 0.5rem 0;
    letter-spacing: 0.1em;
    margin-top: 0.5rem;
    -webkit-tap-highlight-color: transparent;
    transition: color 0.4s;
  }

  .add-pair-btn:hover {
    color: var(--ink-soft);
  }

  /* 流すボタン */
  .submit-area {
    margin-top: 2.5rem;
    text-align: center;
  }

  .submit-btn {
    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    color: var(--ink);
    font-family: inherit;
    font-size: 0.95rem;
    padding: 0.9rem 3.5rem;
    cursor: pointer;
    letter-spacing: 0.45em;
    transition: all 0.6s ease;
    -webkit-tap-highlight-color: transparent;
    border-radius: 999px;
    font-weight: 500;
  }

  .submit-btn:hover {
    background: rgba(255,255,255,0.6);
    border-color: var(--ink-mist);
  }

  .submit-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* 沈むアニメーション */
  .sinking {
    pointer-events: none;
    animation: sink 1.8s ease-in forwards;
  }

  @keyframes sink {
    0% {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }
    100% {
      opacity: 0;
      transform: translateY(50px);
      filter: blur(10px);
    }
  }

  /* みおあと */
  .mioato-container {
    position: relative;
    min-height: 70vh;
    padding: 1rem 0;
  }

  .mioato-empty {
    text-align: center;
    color: rgba(70,75,80,0.75);
    padding: 4rem 0;
    letter-spacing: 0.25em;
    font-size: 0.95rem;
  }

  /* ============================================
     おり（地層）
     5件ごとに層が積もる。上が新しい、下が古い。
     ============================================ */
  .ori-container {
    position: relative;
    min-height: 100vh;
    padding: 1rem 0;
  }

  .ori-empty {
    text-align: center;
    color: var(--ink-mist);
    padding: 4rem 0;
    letter-spacing: 0.25em;
    font-size: 0.95rem;
  }

  /* おり画面：層はカードではなく、水中に文字が立つ現象として表示 */
  .ori-layer {
    background: transparent;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    border: none;
    border-radius: 0;
    padding: 1.4rem 0.4rem;
    margin-bottom: 2.5rem;
    position: relative;
    box-shadow: none;
  }

  /* 深さによる文字の不透明度（古い層ほど沈める） */
  .ori-layer[data-depth="0"] { opacity: 1; }
  .ori-layer[data-depth="1"] { opacity: 0.9; }
  .ori-layer[data-depth="2"] { opacity: 0.8; }
  .ori-layer[data-depth="3"] { opacity: 0.7; }
  .ori-layer[data-depth="4"] { opacity: 0.6; }
  .ori-layer[data-depth="5"] { opacity: 0.5; }

  .ori-layer-meta {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.7);
    margin-bottom: 0.9rem;
    display: flex;
    justify-content: space-between;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }

  /* 深い層ほどメタ情報も沈む（色を変える） */
  .ori-layer[data-depth="0"] .ori-layer-meta,
  .ori-layer[data-depth="1"] .ori-layer-meta {
    color: rgba(60,65,70,0.65);
    text-shadow: 0 1px 2px rgba(255,255,255,0.4);
  }

  .ori-layer-fragments {
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
  }

  .ori-fragment {
    font-size: 0.9rem;
    line-height: 1.7;
    color: rgba(255,255,255,0.85);
    padding-left: 0.6rem;
    border-left: 1px solid rgba(255,255,255,0.3);
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }

  /* 浅い層は墨色（背景が明るいので） */
  .ori-layer[data-depth="0"] .ori-fragment,
  .ori-layer[data-depth="1"] .ori-fragment {
    color: var(--ink);
    border-left-color: rgba(60,65,70,0.2);
    text-shadow: 0 1px 2px rgba(255,255,255,0.5);
  }

  .ori-fragment-empty {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.15em;
    font-style: normal;
  }

  /* おり画面の下端：画像の終わりから黒へフェードするオーバーレイ */
  body.on-ori .ori-container::after {
    content: "";
    position: absolute;
    left: -100vw;
    right: -100vw;
    bottom: -2rem;
    height: 30vh;
    background: linear-gradient(to bottom, rgba(26,26,26,0) 0%, rgba(26,26,26,0.95) 70%, #1a1a1a 100%);
    pointer-events: none;
    z-index: -1;
  }


  /* ============================================
     みおつくし（杭が立つ）
     条件を満たした言葉が、ランダム位置・大小で立つ。
     漂わない。静止する。
     ============================================ */
  .miotsukushi-container {
    position: relative;
    min-height: 70vh;
    padding: 1rem 0;
  }

  .miotsukushi-empty {
    text-align: center;
    color: rgba(70,75,80,0.75);
    padding: 4rem 0;
    letter-spacing: 0.25em;
    font-size: 0.95rem;
  }

  .miotsukushi-field {
    position: relative;
    width: 100%;
    min-height: 70vh;
  }

  .miotsukushi-pillar {
    position: absolute;
    color: var(--ink);
    letter-spacing: 0.1em;
    line-height: 1.4;
    opacity: 0;
    animation: pillar-rise 1.4s ease-out forwards;
    animation-delay: var(--pillar-delay, 0s);
    white-space: nowrap;
    pointer-events: none;
  }

  /* 杭が立つアニメーション：下からすっと上がって、静止 */
  @keyframes pillar-rise {
    0% {
      opacity: 0;
      transform: translateY(8px);
    }
    100% {
      opacity: var(--pillar-opacity, 0.85);
      transform: translateY(0);
    }
  }

  /* 杭のサイズ階調（反復回数で大小） */
  .miotsukushi-pillar[data-size="s"] {
    font-size: 0.85rem;
    --pillar-opacity: 0.4;
  }
  .miotsukushi-pillar[data-size="m"] {
    font-size: 1.1rem;
    --pillar-opacity: 0.75;
  }
  .miotsukushi-pillar[data-size="l"] {
    font-size: 1.5rem;
    --pillar-opacity: 0.9;
  }
  .miotsukushi-pillar[data-size="xl"] {
    font-size: 1.9rem;
    --pillar-opacity: 1;
    font-weight: 500;
  }

  /* 時間軸の状態：核（濃く・大きく立つもの、累計多×最近もよく出てる）*/
  .miotsukushi-pillar[data-state="core"] {
    color: var(--ink);
  }

  /* 時間軸の状態：古い揺れ（薄く・小さく、累計多×最近は出てない）*/
  .miotsukushi-pillar[data-state="old"] {
    color: var(--ink);
    --pillar-opacity: 0.4;
  }

  /* 時間軸の状態：新しい兆し（青みの白、累計少×最近急に増えてる）*/
  .miotsukushi-pillar[data-state="new"] {
    color: #f0f4f8;
    text-shadow:
      0 0 8px rgba(180,200,220,0.4),
      0 1px 2px rgba(60,80,100,0.3);
    --pillar-opacity: 0.85;
  }

  .mioato-card {
    background: var(--glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: 18px;
    padding: 1.5rem 1.6rem;
    margin-bottom: 1.4rem;
    position: relative;
    box-shadow:
      0 4px 16px rgba(60,65,70,0.04),
      inset 0 1px 0 rgba(255,255,255,0.4);
    animation: drift var(--drift-duration, 9s) ease-in-out infinite;
    animation-delay: var(--drift-delay, 0s);
  }

  @keyframes drift {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }

  .mioato-card-date {
    font-size: 0.75rem;
    color: var(--ink-mist);
    letter-spacing: 0.2em;
    margin-bottom: 0.9rem;
    font-weight: 500;
  }

  .mioato-card-question {
    font-size: 1.05rem;
    line-height: 1.9;
    margin-bottom: 0.8rem;
    color: var(--ink);
  }

  .mioato-card-section {
    margin-top: 0.9rem;
    font-size: 0.92rem;
    line-height: 1.7;
    color: var(--ink-soft);
  }

  .mioato-card-section-label {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: var(--ink-mist);
    margin-bottom: 0.4rem;
    font-weight: 500;
  }

  .mioato-card-tags {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    margin-top: 0.8rem;
  }

  .mioato-card-tag {
    font-size: 0.78rem;
    color: var(--ink-soft);
    letter-spacing: 0.15em;
    padding: 0.25rem 0.8rem;
    background: rgba(106,122,133,0.18);
    border-radius: 999px;
    font-weight: 500;
  }

  .mioato-card-contradiction {
    margin-top: 0.4rem;
    color: var(--ink-soft);
    font-size: 0.9rem;
  }

  .mioato-card-word {
    margin-top: 0.4rem;
    font-size: 0.9rem;
    color: var(--ink-soft);
    border-left: 2px solid var(--line);
    padding-left: 0.8rem;
  }

  /* レスポンシブ */
  @media (max-width: 480px) {
    .container {
      padding: 16px;
      padding-right: 32px; /* 右ナビと干渉しないよう */
    }
    .title-text {
      font-size: 28px;
    }
    .glass-card {
      padding: 1.4rem 1.2rem;
    }
  }
</style>
</head>
<body>

<!-- おり画面の地層背景画像（おり画面の時だけ表示） -->
<img class="ori-bg" src="ori.png" alt="" aria-hidden="true">

<div class="container">

  <!-- ============================================
       タイトル（上部中心）
       ロゴ画像が用意できたら .title-text を消して
       <img src="icons/title.png" class="title-image" alt="みおり">
       に差し替え。
       ============================================ -->
  <div class="title-area">
    <img src="icons/title.png" class="title-image" alt="みおり">
    <p class="subtitle">宙ぶらりんを、宙ぶらりんのまま</p>
  </div>

  <!-- みお（入力画面） -->
  <section class="screen active" id="screen-mio">
    <div class="input-area" id="input-area">

      <div class="glass-card">
        <label class="input-label">いまの問い</label>
        <textarea class="input-field" id="input-question" rows="2"></textarea>
      </div>

      <div class="glass-card">
        <label class="input-label">揺れの温度</label>
        <div class="temperature-tags" id="temp-tags">
          <button class="temp-tag" data-temp="冷">冷</button>
          <button class="temp-tag" data-temp="静">静</button>
          <button class="temp-tag" data-temp="混">混</button>
          <button class="temp-tag" data-temp="焦">焦</button>
          <button class="temp-tag" data-temp="空">空</button>
          <button class="temp-tag" data-temp="重">重</button>
          <button class="temp-tag" data-temp="柔">柔</button>
        </div>
      </div>

      <div class="glass-card">
        <label class="input-label">矛盾</label>
        <div id="contradiction-list">
          <div class="contradiction-pair">
            <input class="input-field" type="text" data-side="a">
            <span class="contradiction-slash">/</span>
            <input class="input-field" type="text" data-side="b">
          </div>
        </div>
        <button class="add-pair-btn" id="add-pair">＋ もう一つ</button>
      </div>

      <div class="glass-card">
        <label class="input-label">引っかかった言葉</label>
        <textarea class="input-field" id="input-word" rows="2"></textarea>
      </div>

      <div class="submit-area">
        <button class="submit-btn" id="submit-btn">流す</button>
      </div>

    </div>
  </section>

  <!-- みおあと -->
  <section class="screen" id="screen-mioato">
    <div class="mioato-container" id="mioato-container">
      <div class="mioato-empty">まだ、みおは流れていません。</div>
    </div>
  </section>

  <!-- おり -->
  <section class="screen" id="screen-ori">
    <div class="ori-container" id="ori-container">
      <div class="ori-empty">まだ、おりは沈んでいません。</div>
    </div>
  </section>

  <!-- みおつくし -->
  <section class="screen" id="screen-miotsukushi">
    <div class="miotsukushi-container" id="miotsukushi-container">
      <div class="miotsukushi-empty">まだ、しるべは立っていません。</div>
    </div>
  </section>

</div>

<!-- 右側ナビ（あいろと同じスタイル） -->
<div class="side-nav">
  <button class="active" data-screen="mio">みお</button>
  <button data-screen="mioato">みおあと</button>
  <button data-screen="ori">おり</button>
  <button data-screen="miotsukushi">みおつくし</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
<script>
  /* IndexedDB */
  const DB_NAME = 'miori';
  const DB_VERSION = 1;
  const STORE_NAME = 'mio';

  let db;

  async function initDB() {
    db = await idb.openDB(DB_NAME, DB_VERSION, {
      upgrade(db) {
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          const store = db.createObjectStore(STORE_NAME, {
            keyPath: 'id',
            autoIncrement: true
          });
          store.createIndex('createdAt', 'createdAt');
        }
      }
    });
  }

  async function saveMio(data) {
    return await db.add(STORE_NAME, {
      ...data,
      createdAt: new Date().toISOString()
    });
  }

  async function getAllMio() {
    const all = await db.getAllFromIndex(STORE_NAME, 'createdAt');
    return all.reverse();
  }

  /* 画面切り替え */
  document.querySelectorAll('.side-nav button').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.classList.contains('disabled')) return;
      const target = btn.dataset.screen;

      document.querySelectorAll('.side-nav button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      const el = document.getElementById(`screen-${target}`);
      if (el) el.classList.add('active');

      /* bodyに画面ごとのクラスを付け替え（背景画像切り替え用） */
      document.body.classList.remove('on-mio', 'on-mioato', 'on-ori', 'on-miotsukushi');
      document.body.classList.add(`on-${target}`);

      /* おり画面に入る時はスクロール位置を一番上に戻す */
      if (target === 'ori') {
        window.scrollTo(0, 0);
        const oriBg = document.querySelector('.ori-bg');
        if (oriBg) oriBg.style.transform = 'translateY(0)';
      }

      if (target === 'mioato') {
        renderMioato();
      } else if (target === 'ori') {
        renderOri();
      } else if (target === 'miotsukushi') {
        renderMiotsukushi();
      }
    });
  });

  /* おり画面：スクロールに合わせて背景画像を動かす（下に潜っていく感覚） */
  window.addEventListener('scroll', () => {
    if (document.body.classList.contains('on-ori')) {
      const oriBg = document.querySelector('.ori-bg');
      if (oriBg) {
        oriBg.style.transform = `translateY(${-window.scrollY}px)`;
      }
    }
  }, { passive: true });

  /* 温度タグ */
  document.querySelectorAll('.temp-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      tag.classList.toggle('selected');
    });
  });

  /* 矛盾ペア追加 */
  document.getElementById('add-pair').addEventListener('click', () => {
    const list = document.getElementById('contradiction-list');
    const pair = document.createElement('div');
    pair.className = 'contradiction-pair';
    pair.innerHTML = `
      <input class="input-field" type="text" data-side="a">
      <span class="contradiction-slash">/</span>
      <input class="input-field" type="text" data-side="b">
    `;
    list.appendChild(pair);
  });

  function collectInputData() {
    const question = document.getElementById('input-question').value.trim();
    const temps = Array.from(document.querySelectorAll('.temp-tag.selected'))
      .map(t => t.dataset.temp);
    const contradictions = [];
    document.querySelectorAll('.contradiction-pair').forEach(pair => {
      const a = pair.querySelector('[data-side="a"]').value.trim();
      const b = pair.querySelector('[data-side="b"]').value.trim();
      if (a || b) {
        contradictions.push({ a, b });
      }
    });
    const word = document.getElementById('input-word').value.trim();
    return { question, temps, contradictions, word };
  }

  function hasAnyInput(data) {
    return data.question
        || data.temps.length > 0
        || data.contradictions.length > 0
        || data.word;
  }

  function clearInputs() {
    document.getElementById('input-question').value = '';
    document.getElementById('input-word').value = '';
    document.querySelectorAll('.temp-tag').forEach(t => t.classList.remove('selected'));
    const list = document.getElementById('contradiction-list');
    list.innerHTML = `
      <div class="contradiction-pair">
        <input class="input-field" type="text" data-side="a">
        <span class="contradiction-slash">/</span>
        <input class="input-field" type="text" data-side="b">
      </div>
    `;
  }

  document.getElementById('submit-btn').addEventListener('click', async () => {
    const data = collectInputData();
    if (!hasAnyInput(data)) return;
    await saveMio(data);
    const inputArea = document.getElementById('input-area');
    inputArea.classList.add('sinking');
    setTimeout(() => {
      clearInputs();
      inputArea.classList.remove('sinking');
    }, 1800);
  });

  async function renderMioato() {
    const container = document.getElementById('mioato-container');
    const all = await getAllMio();
    if (all.length === 0) {
      container.innerHTML = '<div class="mioato-empty">まだ、みおは流れていません。</div>';
      return;
    }
    container.innerHTML = all.map(mio => {
      const duration = 7 + Math.random() * 6;
      const delay = -Math.random() * duration;
      const date = formatDate(mio.createdAt);
      let html = `<div class="mioato-card" style="--drift-duration: ${duration}s; --drift-delay: ${delay}s;">`;
      html += `<div class="mioato-card-date">${date}</div>`;
      if (mio.question) {
        html += `<div class="mioato-card-question">${escapeHtml(mio.question)}</div>`;
      }
      if (mio.temps && mio.temps.length > 0) {
        html += `<div class="mioato-card-tags">`;
        mio.temps.forEach(t => {
          html += `<span class="mioato-card-tag">${t}</span>`;
        });
        html += `</div>`;
      }
      if (mio.contradictions && mio.contradictions.length > 0) {
        html += `<div class="mioato-card-section">`;
        html += `<div class="mioato-card-section-label">矛盾</div>`;
        mio.contradictions.forEach(c => {
          html += `<div class="mioato-card-contradiction">${escapeHtml(c.a)} / ${escapeHtml(c.b)}</div>`;
        });
        html += `</div>`;
      }
      if (mio.word) {
        html += `<div class="mioato-card-section">`;
        html += `<div class="mioato-card-section-label">引っかかった言葉</div>`;
        html += `<div class="mioato-card-word">${escapeHtml(mio.word)}</div>`;
        html += `</div>`;
      }
      html += `</div>`;
      return html;
    }).join('');
  }

  /* ============================================
     おり（地層）
     5件ごとに層が割れる。上が新しい、下が古い。
     ============================================ */
  async function renderOri() {
    const container = document.getElementById('ori-container');
    const all = await getAllMio(); // 新しい順
    if (all.length < 5) {
      container.innerHTML = '<div class="ori-empty">まだ、おりは沈んでいません。</div>';
      return;
    }

    // 5件ずつ層に分ける（新しい順）
    const layers = [];
    for (let i = 0; i < all.length; i += 5) {
      layers.push(all.slice(i, i + 5));
    }
    // 5件に満たない最後のグループは「未完の層」として除外（沈みきっていない）
    const completeLayers = layers.filter(l => l.length === 5);

    if (completeLayers.length === 0) {
      container.innerHTML = '<div class="ori-empty">まだ、おりは沈んでいません。</div>';
      return;
    }

    container.innerHTML = completeLayers.map((layer, depth) => {
      const oldestDate = formatDate(layer[layer.length - 1].createdAt);
      const newestDate = formatDate(layer[0].createdAt);
      const layerNum = depth + 1;

      // 層内の問いを取り出す（問いがあるものだけ、なければ温度や言葉）
      const fragments = layer.map(mio => {
        if (mio.question) return escapeHtml(mio.question);
        if (mio.word) return escapeHtml(mio.word);
        if (mio.temps && mio.temps.length > 0) return mio.temps.join('・');
        if (mio.contradictions && mio.contradictions.length > 0) {
          const c = mio.contradictions[0];
          return `${escapeHtml(c.a)} / ${escapeHtml(c.b)}`;
        }
        return '<span class="ori-fragment-empty">(沈黙)</span>';
      });

      let html = `<div class="ori-layer" data-depth="${Math.min(depth, 5)}">`;
      html += `<div class="ori-layer-meta">`;
      html += `<span>第${layerNum}層</span>`;
      html += `<span>${newestDate.split(' ')[0]} 〜 ${oldestDate.split(' ')[0]}</span>`;
      html += `</div>`;
      html += `<div class="ori-layer-fragments">`;
      fragments.forEach(f => {
        html += `<div class="ori-fragment">${f}</div>`;
      });
      html += `</div>`;
      html += `</div>`;
      return html;
    }).join('');
  }

  /* ============================================
     みおつくし（杭が立つ）
     条件を満たした要素が、ランダム配置・大小で立つ。
     時間軸の3状態で立ち方が変わる：
       - 核（core）：累計多 × 最近もよく出てる（濃く・大きく）→ 常に立つ
       - 古い揺れ（old）：累計多 × 最近は出てない（薄く・小さく）→ ランダムに出会う
       - 新しい兆し（new）：累計少 × 最近急に増えてる（青みの白）→ 常に立つ
     全体ログが5件未満なら何も立たない。
     ============================================ */
  async function renderMiotsukushi() {
    const container = document.getElementById('miotsukushi-container');
    const all = await getAllMio();
    if (all.length < 5) {
      container.innerHTML = '<div class="miotsukushi-empty">まだ、しるべは立っていません。</div>';
      return;
    }

    // 「最近」の定義：30日以内
    const RECENT_DAYS = 30;
    const now = Date.now();
    const recentThreshold = now - RECENT_DAYS * 24 * 60 * 60 * 1000;

    // 温度の出現を、累計と最近で集計
    const tempStats = {}; // { temp: { total: n, recent: n } }
    all.forEach(mio => {
      if (mio.temps && mio.createdAt) {
        const ts = new Date(mio.createdAt).getTime();
        const isRecent = ts >= recentThreshold;
        mio.temps.forEach(t => {
          if (!tempStats[t]) tempStats[t] = { total: 0, recent: 0 };
          tempStats[t].total++;
          if (isRecent) tempStats[t].recent++;
        });
      }
    });

    // 矛盾の言葉を、累計と最近で集計
    const wordStats = {}; // { word: { total: n, recent: n } }
    let totalContradictions = 0;
    all.forEach(mio => {
      if (mio.contradictions && mio.createdAt) {
        const ts = new Date(mio.createdAt).getTime();
        const isRecent = ts >= recentThreshold;
        mio.contradictions.forEach(c => {
          totalContradictions++;
          [c.a, c.b].forEach(word => {
            if (!word) return;
            if (!wordStats[word]) wordStats[word] = { total: 0, recent: 0 };
            wordStats[word].total++;
            if (isRecent) wordStats[word].recent++;
          });
        });
      }
    });

    // 状態判定関数：累計と最近の比率から、core / old / new を決める
    function classify(stat, type) {
      const { total, recent } = stat;
      // type === 'temp' の閾値
      // type === 'contradiction' の閾値
      const heavyThreshold = type === 'temp' ? 5 : 3;
      const lightMin = type === 'temp' ? 3 : 2;

      // 累計が多い
      if (total >= heavyThreshold) {
        // 最近もよく出てる → 核
        if (recent >= 2) return 'core';
        // 最近は出てない → 古い揺れ
        return 'old';
      }
      // 累計は少なめだけど、最近に偏ってる → 新しい兆し
      if (total >= lightMin && recent >= Math.ceil(total / 2)) {
        return 'new';
      }
      // どれにも該当しない → 立たない
      return null;
    }

    // サイズを決める：状態と累計から
    function getSize(stat, state, type) {
      const { total } = stat;
      if (state === 'old') {
        // 古い揺れは小さめ
        return total >= 8 ? 'm' : 's';
      }
      if (state === 'new') {
        // 新しい兆しは中サイズ固定（兆しなので、まだ大きく立たない）
        return 'm';
      }
      // 核（core）は累計に応じて大きく
      if (type === 'temp') {
        if (total >= 10) return 'xl';
        if (total >= 6) return 'l';
        return 'm';
      } else {
        if (total >= 5) return 'xl';
        if (total >= 3) return 'l';
        return 'm';
      }
    }

    // 立つ杭を集める
    const pillars = [];

    Object.entries(tempStats).forEach(([temp, stat]) => {
      const state = classify(stat, 'temp');
      if (state) {
        pillars.push({
          text: temp,
          stat: stat,
          state: state,
          size: getSize(stat, state, 'temp'),
          type: 'temp'
        });
      }
    });

    // 矛盾は全体で2件以上ある場合のみ立てる（既存仕様を維持）
    if (totalContradictions >= 2) {
      Object.entries(wordStats).forEach(([word, stat]) => {
        const state = classify(stat, 'contradiction');
        if (state) {
          pillars.push({
            text: word,
            stat: stat,
            state: state,
            size: getSize(stat, state, 'contradiction'),
            type: 'contradiction'
          });
        }
      });
    }

    if (pillars.length === 0) {
      container.innerHTML = '<div class="miotsukushi-empty">まだ、しるべは立っていません。</div>';
      return;
    }

    // 表示する杭を選ぶ：
    //   core と new は常に表示
    //   old はランダムに表示（出会うかどうか分からない）
    const alwaysShow = pillars.filter(p => p.state === 'core' || p.state === 'new');
    const oldOnes = pillars.filter(p => p.state === 'old');

    // old のうち、ランダムに 30%〜70% を選ぶ（毎回違う出会い）
    const oldShuffled = oldOnes.sort(() => Math.random() - 0.5);
    const oldCount = oldOnes.length;
    const showCount = oldCount === 0 ? 0 : Math.max(1, Math.floor(oldCount * (0.3 + Math.random() * 0.4)));
    const oldToShow = oldShuffled.slice(0, showCount);

    const displayed = [...alwaysShow, ...oldToShow];

    if (displayed.length === 0) {
      container.innerHTML = '<div class="miotsukushi-empty">まだ、しるべは立っていません。</div>';
      return;
    }

    // ランダム配置：縦方向はN分割した各セル内でずらす、横方向はランダム
    const cells = displayed.length;
    const cellHeight = 100 / cells; // %

    const placements = displayed.map((p, i) => {
      const topMin = i * cellHeight + cellHeight * 0.1;
      const topMax = i * cellHeight + cellHeight * 0.7;
      const top = topMin + Math.random() * (topMax - topMin);
      const left = 5 + Math.random() * 60; // 5%〜65%
      return { ...p, top, left };
    });

    // シャッフルしてアニメーション順をランダムに
    const shuffled = placements
      .map(p => ({ ...p, sort: Math.random() }))
      .sort((a, b) => a.sort - b.sort);

    let html = '<div class="miotsukushi-field">';
    shuffled.forEach((p, i) => {
      const delay = i * 0.18;
      html += `<div class="miotsukushi-pillar" `;
      html += `data-size="${p.size}" `;
      html += `data-state="${p.state}" `;
      html += `style="top: ${p.top}%; left: ${p.left}%; --pillar-delay: ${delay}s;">`;
      html += `${escapeHtml(p.text)}`;
      html += `</div>`;
    });
    html += '</div>';
    container.innerHTML = html;
  }

  function formatDate(iso) {
    const d = new Date(iso);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    const hh = String(d.getHours()).padStart(2, '0');
    const mm = String(d.getMinutes()).padStart(2, '0');
    return `${y}.${m}.${day}  ${hh}:${mm}`;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  initDB();

  /* 起動時のフェードイン（あいろと同じ） */
  document.addEventListener('DOMContentLoaded', () => {
    /* 初期画面は「みお」なのでbodyにon-mioを付ける */
    document.body.classList.add('on-mio');

    const container = document.querySelector('.container');
    if (container) {
      setTimeout(() => {
        container.classList.add('show');
      }, 50);
    }
  });

  /* Service Worker */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.warn('SW registration failed:', err));
    });
  }
</script>

</body>
</html>
